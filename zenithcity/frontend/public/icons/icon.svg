<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0A0E27"/>
      <stop offset="100%" stop-color="#020614"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <circle cx="256" cy="256" r="256" fill="url(#bg)"/>
  <g filter="url(#glow)" transform="translate(256,256)">
    <polygon points="-10,-80 50,-80 0,-8 30,-8 -50,80 0,8 -30,8" fill="#00F5FF"/>
    <text x="0" y="15" text-anchor="middle" font-family="Arial,sans-serif" font-weight="bold" font-size="140" fill="#00F5FF">Z</text>
  </g>
</svg>
